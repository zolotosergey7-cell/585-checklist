// BUILD UI
function build() {
  const c = document.getElementById('content');
  c.innerHTML = '';

  // Info block
  c.appendChild(buildInfo());

  // Progress bar
  const pb = document.getElementById('progBar');
  pb.innerHTML = '';
  SECTIONS.forEach(s => {
    const d = document.createElement('div');
    d.className = 'prog-sec';
    d.id = 'pb_' + s.id;
    d.title = s.title;
    d.onclick = () => document.getElementById(s.id).scrollIntoView({behavior:'smooth'});
    pb.appendChild(d);
  });

  // Sections
  SECTIONS.forEach(s => c.appendChild(buildSection(s)));

  // Tasks
  c.appendChild(buildTasks());

  // Signature
  c.appendChild(buildSign());

  // Result
  c.appendChild(buildResult());

  // Open first
  toggle('body_s1');
}

  const d = now.toLocaleDateString('ru-RU',{day:'2-digit',month:'long',year:'numeric'});
  const t = now.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
  const div = document.createElement('div');
  div.className = 'section-card';
  div.innerHTML = `
    <div class="section-header" onclick="toggle('body_info')">
      <span class="section-title">📍 Информация об объекте</span><span>▼</span>
    </div>
    <div class="section-body open" id="body_info">
      <div class="info-block">
        <div class="info-row">
          <div class="info-label">Адрес объекта *</div>
          <select class="info-input" id="storeSelect" onchange="infoFields.store=this.value">
            <option value="">— Выберите магазин —</option>
            ${stores.map(s=>`<option value="${s}">${s}</option>`).join('')}
          </select>
        </div>
        <div class="info-row-2">
          <div class="info-row"><div class="info-label">Дата</div><input class="info-input" value="${d}" readonly></div>
          <div class="info-row"><div class="info-label">Время</div><input class="info-input" value="${t}" readonly></div>
        </div>
        <div class="info-row"><div class="info-label">ФИО проверяющего (ДГМ) *</div><input class="info-input" placeholder="Введите ФИО" oninput="infoFields.dgm=this.value"></div>
        <div class="info-row"><div class="info-label">ФИО ДФ</div><input class="info-input" placeholder="Введите ФИО" oninput="infoFields.df=this.value"></div>
        <div class="info-row"><div class="info-label">ФИО СП</div><input class="info-input" placeholder="Введите ФИО" oninput="infoFields.sp=this.value"></div>
        <div class="info-row"><div class="info-label">ФИО товароведа</div><input class="info-input" placeholder="Введите ФИО" oninput="infoFields.tovar=this.value"></div>
        <div class="info-row"><div class="info-label">ФИО продавцов</div><input class="info-input" placeholder="Введите ФИО" oninput="infoFields.sellers=this.value"></div>
      </div>
    </div>`;
  return div;
}

function buildSection(s) {
  const div = document.createElement('div');
  div.className = 'section-card';
  div.id = s.id;
  div.innerHTML = `
    <div class="section-header" onclick="toggle('body_${s.id}')">
      <span class="section-title">${s.title}</span>
      <span class="section-score" id="sc_${s.id}">0/${s.items.length}</span>
    </div>
    <div class="section-body" id="body_${s.id}">
      ${s.items.map(i=>`
        <div class="check-item" id="ci_${i.n}">
          <div class="check-num">Пункт ${i.n}</div>
          <div class="check-text">${i.t}</div>
          <div class="check-btns">
            <button class="btn-yes" id="y_${i.n}" onclick="setAns(${i.n},'yes')">✓ Да</button>
            <button class="btn-no" id="n_${i.n}" onclick="setAns(${i.n},'no')">✗ Нет</button>
          </div>
          <textarea class="check-comment" rows="2" placeholder="Комментарий..." oninput="comments[${i.n}]=this.value"></textarea>
        </div>`).join('')}
    </div>`;
  return div;
}

function buildTasks() {
  const div = document.createElement('div');
  div.className = 'tasks-block';
  div.innerHTML = `
    <div class="tasks-header"><div class="tasks-title">📋 Задачи по итогам проверки</div></div>
    <div class="tasks-body">
      <button class="auto-tasks-btn" onclick="autoTasks()">⚡ Создать задачи по нарушениям автоматически</button>
      <div id="tasksList"></div>
      <textarea class="task-input" id="newTaskText" rows="2" placeholder="Описание задачи..."></textarea>
      <div style="display:flex;gap:8px;margin-top:6px">
        <input type="date" class="task-deadline" id="newDeadline">
        <button class="btn-add-task" onclick="addTask()">+ Добавить</button>
      </div>
    </div>`;
  return div;
}

function buildSign() {
  const div = document.createElement('div');
  div.className = 'sign-block';
  div.innerHTML = `
    <div class="sign-header"><div class="sign-title">✍️ Подпись проверяющего</div></div>
    <canvas id="sigCanvas" height="150"></canvas>
    <button class="btn-clear" onclick="clearSig()">✕ Очистить</button>`;
  setTimeout(initSig, 200);
  return div;
}

function buildResult() {
  const div = document.createElement('div');
  div.className = 'result-block';
  div.id = 'resultBlock';
  div.innerHTML = `
    <div class="result-title">📊 Итог проверки</div>
    <div class="result-stats">
      <div class="stat-box g"><div class="stat-num g" id="rYes">0</div><div class="stat-label">Соответствует</div></div>
      <div class="stat-box r"><div class="stat-num r" id="rNo">0</div><div class="stat-label">Не соответствует</div></div>
      <div class="stat-box gr"><div class="stat-num gr" id="rSkip">74</div><div class="stat-label">Не проверено</div></div>
    </div>
    <div class="result-pct" id="rPct">0%</div>
    <div class="result-pct-label">Результат проверки</div>
    <div id="secResults"></div>`;
  return div;
}

function toggle(id) {
  const el = document.getElementById(id);
  if (el) el.classList.toggle('open');
}

function setAns(n, val) {
  answers[n] = val;
  document.getElementById('ci_'+n).className = 'check-item ' + val;
  document.getElementById('y_'+n).className = 'btn-yes' + (val==='yes'?' active':'');
  document.getElementById('n_'+n).className = 'btn-no' + (val==='no'?' active':'');
  updateUI();
}

function updateUI() {
  let yes=0, no=0, total=Object.keys(answers).length;
  SECTIONS.forEach(s => {
    let sY=0;
    s.items.forEach(i => {
      if(answers[i.n]==='yes'){yes++;sY++;}
      if(answers[i.n]==='no') no++;
    });
    const sc = document.getElementById('sc_'+s.id);
    if(sc) sc.textContent = sY+'/'+s.items.length;
    const pb = document.getElementById('pb_'+s.id);
    if(pb){
      const tot = s.items.filter(i=>answers[i.n]).length;
      pb.className = 'prog-sec' + (tot===s.items.length?' done':tot>0?' partial':'');
    }
  });
  document.getElementById('progText').textContent = total+' из 74 проверено';
  const pct = total>0?Math.round(yes/total*100):0;
  document.getElementById('rYes').textContent = yes;
  document.getElementById('rNo').textContent = no;
  document.getElementById('rSkip').textContent = 74-total;
  document.getElementById('rPct').textContent = pct+'%';
  const sr = document.getElementById('secResults');
  if(sr) sr.innerHTML = SECTIONS.map(s=>{
    let sY=0; s.items.forEach(i=>{if(answers[i.n]==='yes')sY++;});
    return `<div class="sec-row"><span>${s.title}</span><span style="font-weight:700;color:#f5a623">${sY}/${s.items.length}</span></div>`;
  }).join('');
}

function autoTasks() {
  SECTIONS.forEach(s => s.items.forEach(i => {
    if(answers[i.n]==='no' && !tasks.find(t=>t.auto&&t.ref===i.n)){
      const dl = new Date(); dl.setDate(dl.getDate()+3);
      tasks.push({text:i.t, deadline:dl.toISOString().split('T')[0], auto:true, ref:i.n});
    }
  }));
  renderTasks();
}

function addTask() {
  const txt = document.getElementById('newTaskText').value.trim();
  const dl = document.getElementById('newDeadline').value;
  if(!txt){alert('Введите описание');return;}
  tasks.push({text:txt, deadline:dl, auto:false});
  document.getElementById('newTaskText').value='';
  document.getElementById('newDeadline').value='';
  renderTasks();
}

function delTask(i) { tasks.splice(i,1); renderTasks(); }

function renderTasks() {
  document.getElementById('tasksList').innerHTML = tasks.map((t,i)=>`
    <div class="task-item">
      <button class="task-delete" onclick="delTask(${i})">✕</button>
      <div class="task-text">${t.text}</div>
      ${t.deadline?`<div class="task-meta">📅 ${t.deadline}</div>`:''}
      ${t.auto?'<div class="task-meta" style="color:#f5a623">⚡ По нарушению</div>':''}
    </div>`).join('');
}

function initSig() {
  const c = document.getElementById('sigCanvas');
  if(!c) return;
  c.width = c.offsetWidth * devicePixelRatio;
  c.height = 150 * devicePixelRatio;
  const ctx = c.getContext('2d');
  ctx.scale(devicePixelRatio, devicePixelRatio);
  ctx.strokeStyle='#333'; ctx.lineWidth=2; ctx.lineCap='round';
  let drawing=false, lx, ly;
  const pos = e => { const r=c.getBoundingClientRect(),s=e.touches?e.touches[0]:e; return {x:s.clientX-r.left,y:s.clientY-r.top}; };
  c.onmousedown = e=>{drawing=true;const p=pos(e);lx=p.x;ly=p.y;};
  c.onmousemove = e=>{if(!drawing)return;const p=pos(e);ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(p.x,p.y);ctx.stroke();lx=p.x;ly=p.y;};
  c.onmouseup = ()=>drawing=false;
  c.ontouchstart = e=>{e.preventDefault();drawing=true;const p=pos(e);lx=p.x;ly=p.y;};
  c.ontouchmove = e=>{e.preventDefault();if(!drawing)return;const p=pos(e);ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(p.x,p.y);ctx.stroke();lx=p.x;ly=p.y;};
  c.ontouchend = ()=>drawing=false;
}

function clearSig() {
  const c=document.getElementById('sigCanvas');
  c.getContext('2d').clearRect(0,0,c.width,c.height);
}

async function submitCheck() {
  const store = document.getElementById('storeSelect')?.value;
  if(!store){alert('Выберите магазин');return;}
  const answered = Object.keys(answers).length;
  if(answered < 5){alert('Заполните хотя бы 5 пунктов');return;}

  const yes = Object.values(answers).filter(v=>v==='yes').length;
  const pct = Math.round(yes/answered*100);

  try {
    document.getElementById('submitBtn').disabled = true;
    document.getElementById('submitBtn').textContent = 'Сохраняем...';

    const res = await fetch('/api/checks', {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
      body: JSON.stringify({
        store, dgm_name:infoFields.dgm||'', df_name:infoFields.df||'',
        sp_name:infoFields.sp||'', tovar_name:infoFields.tovar||'',
        sellers_name:infoFields.sellers||'', answers, comments, score_percent:pct
      })
    });
    const data = await res.json();
    if(!res.ok) throw new Error(data.error);

    // Сохраняем задачи
    if(tasks.length > 0) {
      await fetch('/api/tasks', {
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
        body: JSON.stringify({tasks, check_id:data.check_id, store})
      });
    }

    const ss = document.getElementById('successScreen');
    ss.style.display = 'flex';
    document.getElementById('successSub').innerHTML =
      `<b>${store}</b><br>Соответствует: ${yes} | Нарушений: ${Object.values(answers).filter(v=>v==='no').length} | Результат: <b>${pct}%</b><br>Задач поставлено: ${tasks.length}`;

  } catch(e) {
    alert('Ошибка: ' + e.message);
    document.getElementById('submitBtn').disabled = false;
    document.getElementById('submitBtn').textContent = 'Завершить проверку';
  }
}

function logout() {
  localStorage.clear();
  window.location.href = '/';
}

build();
</script>
</body>
</html>
