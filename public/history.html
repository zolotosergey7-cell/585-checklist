let allChecks = [];
let tasksMap = {};

async function load() {
  try {
    const [checksRes, tasksRes] = await Promise.all([
      fetch('/api/checks', {headers:{'Authorization':'Bearer '+token}}),
      fetch('/api/tasks', {headers:{'Authorization':'Bearer '+token}})
    ]);
    allChecks = await checksRes.json();
    const tasks = await tasksRes.json();

    // Группируем задачи по check_id
    tasksMap = {};
    tasks.forEach(t => {
      if (!tasksMap[t.check_id]) tasksMap[t.check_id] = [];
      tasksMap[t.check_id].push(t);
    });

    // Заполняем фильтр
    const stores = [...new Set(allChecks.map(c => c.store).filter(Boolean))].sort();
    const sel = document.getElementById('storeFilter');
    stores.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s; opt.textContent = s;
      sel.appendChild(opt);
    });

    renderChecks(allChecks);
  } catch(e) {
    document.getElementById('checksList').innerHTML = '<div class="empty">Ошибка загрузки</div>';
  }
}

function filterChecks() {
  const store = document.getElementById('storeFilter').value;
  const filtered = store ? allChecks.filter(c => c.store === store) : allChecks;
  renderChecks(filtered);
}

function renderChecks(checks) {
  if (!checks.length) {
    document.getElementById('checksList').innerHTML = `
      <div class="empty"><div class="empty-icon">📋</div>Проверок пока нет</div>`;
    return;
  }

  document.getElementById('checksList').innerHTML = checks.map(c => {
    const dt = new Date(c.created_at).toLocaleString('ru-RU');
    const answers = c.answers || {};
    const yes = Object.values(answers).filter(v=>v==='yes').length;
    const no = Object.values(answers).filter(v=>v==='no').length;
    const pct = c.score_percent || 0;
    const scoreClass = pct >= 80 ? 'good' : pct >= 60 ? 'mid' : 'bad';
    const tasks = tasksMap[c.id] || [];
    const pendingTasks = tasks.filter(t => t.status === 'pending_confirm').length;

    return `<div class="check-card" id="card_${c.id}">
      <div class="check-card-header" onclick="toggleCard(${c.id})">
        <div class="check-card-left">
          <div class="check-store">${c.store || '—'}</div>
          <div class="check-date">📅 ${dt}</div>
          <div class="check-dgm">ДГМ: ${c.dgm_name || '—'}</div>
          ${pendingTasks > 0 ? `<div style="color:#7b1fa2;font-size:11px;font-weight:700;margin-top:4px">⏳ ${pendingTasks} задач ожидают подтверждения</div>` : ''}
        </div>
        <div class="check-score-box">
          <div class="check-score ${scoreClass}">${pct}%</div>
          <div class="check-score-label">результат</div>
        </div>
      </div>
      <div class="check-body" id="body_${c.id}">
        <div class="summary-bar">
          <div class="sum-box g"><div class="sum-n g">${yes}</div><div class="sum-l">Соответствует</div></div>
          <div class="sum-box r"><div class="sum-n r">${no}</div><div class="sum-l">Нарушений</div></div>
          <div class="sum-box gr"><div class="sum-n gr">${74-yes-no}</div><div class="sum-l">Не проверено</div></div>
        </div>
        ${renderViolations(answers, c.comments)}
        ${renderTasks(tasks, c.id)}
      </div>
    </div>`;
  }).join('');
}

function renderViolations(answers, comments) {
  const violations = Object.entries(answers)
    .filter(([,v]) => v === 'no')
    .map(([n]) => ({n: parseInt(n), text: ITEMS[n]}));

  if (!violations.length) return '';

  return `<div class="violations-section">
    <div class="violations-title">❌ Нарушения (${violations.length})</div>
    ${violations.map(v => {
      const comm = comments && comments[v.n] ? `<div style="color:#888;font-size:11px;margin-top:2px">💬 ${comments[v.n]}</div>` : '';
      return `<div class="violation-row">
        <span class="violation-num">${v.n}.</span>
        <div><div>${v.text}</div>${comm}</div>
      </div>`;
    }).join('')}
  </div>`;
}

function renderTasks(tasks, checkId) {
  if (!tasks.length) return `<div class="no-tasks">Задач по этой проверке нет</div>`;

  return `<div class="tasks-section">
    <div class="tasks-title">📋 Задачи (${tasks.length})</div>
    ${tasks.map(t => {
      const b = BADGE[t.status] || BADGE.new;
      const canConfirm = t.status === 'pending_confirm';
      const rejectNote = t.reject_comment
        ? `<div class="reject-note">Возвращено с комментарием: ${t.reject_comment}</div>` : '';
      return `<div class="task-row ${t.status}" id="task_${t.id}">
        <span class="badge ${b.cls}">${b.label}</span>
        <div class="task-text">${t.text}</div>
        <div class="task-meta">${t.deadline ? '📅 Срок: '+t.deadline : ''} ${t.auto ? '| ⚡ По нарушению' : ''}</div>
        ${rejectNote}
        ${canConfirm ? `
          <div class="task-actions">
            <button class="btn-confirm" onclick="confirmTask(${t.id}, ${checkId})">✓ Подтвердить</button>
            <button class="btn-reject" onclick="showReject(${t.id}, ${checkId})">✗ Вернуть</button>
          </div>
          <div id="reject_${t.id}" style="display:none">
            <input class="reject-input" id="reject_text_${t.id}" placeholder="Причина возврата...">
            <div class="task-actions" style="margin-top:8px">
              <button class="btn-reject" onclick="rejectTask(${t.id}, ${checkId})">Отправить</button>
            </div>
          </div>` : ''}
      </div>`;
    }).join('')}
  </div>`;
}

function toggleCard(id) {
  const body = document.getElementById('body_' + id);
  body.classList.toggle('open');
}

async function confirmTask(taskId, checkId) {
  try {
    const res = await fetch('/api/tasks/'+taskId+'/confirm', {
      method:'PATCH',
      headers:{'Authorization':'Bearer '+token}
    });
    if (res.ok) {
      // Обновляем локально
      for (const arr of Object.values(tasksMap)) {
        const t = arr.find(t => t.id === taskId);
        if (t) { t.status = 'closed'; break; }
      }
      const card = document.getElementById('task_' + taskId);
      if (card) {
        card.className = 'task-row closed';
        card.querySelector('.badge').className = 'badge closed';
        card.querySelector('.badge').textContent = 'Закрыта';
        const actions = card.querySelector('.task-actions');
        if (actions) actions.remove();
      }
    }
  } catch(e) { alert('Ошибка'); }
}

function showReject(taskId) {
  const div = document.getElementById('reject_' + taskId);
  if (div) div.style.display = div.style.display === 'none' ? 'block' : 'none';
}

async function rejectTask(taskId, checkId) {
  const comment = document.getElementById('reject_text_' + taskId)?.value.trim();
  if (!comment) { alert('Введите причину возврата'); return; }
  try {
    const res = await fetch('/api/tasks/'+taskId+'/reject', {
      method:'PATCH',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
      body: JSON.stringify({comment})
    });
    if (res.ok) {
      for (const arr of Object.values(tasksMap)) {
        const t = arr.find(t => t.id === taskId);
        if (t) { t.status = 'in_work'; t.reject_comment = comment; break; }
      }
      const card = document.getElementById('task_' + taskId);
      if (card) {
        card.className = 'task-row in_work';
        card.querySelector('.badge').className = 'badge in_work';
        card.querySelector('.badge').textContent = 'В работе';
        const actions = card.querySelector('.task-actions');
        if (actions) actions.remove();
        const rejectDiv = document.getElementById('reject_' + taskId);
        if (rejectDiv) rejectDiv.remove();
        card.insertAdjacentHTML('beforeend',
          `<div class="reject-note">Возвращено с комментарием: ${comment}</div>`);
      }
    }
  } catch(e) { alert('Ошибка'); }
}

function goBack() {
  window.location.href = '/dgm.html';
}

load();
</script>
